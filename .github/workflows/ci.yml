name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install black flake8
          pip install -r services/User_service/requirements.txt
      - name: Run Black
        run: black --check services/
      - name: Run Flake8
        run: flake8 services/ --max-line-length=88

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: travel
          POSTGRES_PASSWORD: travel123
          POSTGRES_DB: travel
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/User_service/requirements.txt
      - name: Run tests
        env:
          DATABASE_URL: postgresql://travel:travel123@localhost:5432/travel
        run: pytest services/User_service/tests/ -v